<!doctype html>
<html lang="lv" data-bs-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="Vecmāmiņas.lv — Trešās paaudzes universitāte, senioru izglītība un aktualitātes Latvijā.">
  <title>Vecmāmiņas.lv</title>
  <link rel="icon" type="image/x-icon" href="./assets/images/icons/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="./assets/css/bootstrap.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- GALVENAIS SATURS -->
  <main class="container">
    <img class="img-fluid mb-5 main-img"
      src="https://picflow.media/images/resized/1920x906q85/d836e9c5-6ba1-430f-ba55-6a718da04aed.jpg"
      alt="Tējkanna uz grāmatām"
      title="Photo by Ylanite Koppens: https://www.pexels.com/photo/photo-of-teacup-on-top-of-books-1831744/">

    <h1 class="mb-5" id="welcome">
      Laipni lūgti <span><i style="font-weight: 500;">Vecmāmiņas.lv</i></span>!
    </h1>
  </main>

  <!-- MODĀLAIS LOGS — Jaunākie raksti -->
  <div class="modal fade" id="newsPopUpModal" tabindex="-1" aria-labelledby="newsPopUpModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="newsPopUpModalLabel">Jaunākie raksti</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Aizvērt"></button>
        </div>

        <div class="modal-body">
          <div class="d-flex flex-column align-items-center gap-3">
            
            <h3 class="mt-3">Jaunumi</h3>

            <!-- Ziņas tiek ielādētas automātiski no /modal_popup/ mapes -->
            <div id="news-container" class="w-100 text-center">
              <p class="text-muted">Ielādē ziņas...</p>
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Aizvērt</button>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
