  <!-- HEADER -->

  <main class="container">

    <!--^ Aktualitātes, Main bilde, apakš navigācijas josla -->
    <div class="my-5">
      <h1>Aktualitātes</h1>

      <nav class="navbar navbar-expand-lg bg-body-tertiary rounded" aria-label="Twelfth navbar example">
        <div class="container-fluid">
          <div class="navbar-collapse justify-content-md-center" id="navbarsExample10">
            <ul class="navbar-nav">

              <li class="nav-item">
                <a class="nav-link" href="../pages/topicality.html#news">
                  Jaunumi</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="../pages/topicality.html#events">
                  Notikumi</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="../pages/topicality.html#university">
                  Trešās paaudzes universitāte</a>
              </li>

            </ul>
          </div>
        </div>
      </nav>
    </div>

    <!--^ Jaunumi -->
    <div id="news" class="container mt-5">
      <h1 class="mb-5">Jaunumi</h1>
      <div id="topicality-news-container"></div>
    </div>
    <hr>

    <!--^ Notikumi -->
    <div id="events" class="text-center mb-5">
      <h1>Notikumi</h1>
      <!--~ Notikumu pogas -ģenerē main.js no topicalityEvents masīva -->
      <div id="topicality-events-btns-container" class="event-btns mb-5"></div>
      <div id="topicality-events-container"></div>
    </div>
    <hr>

    <!--^ "Trešās paaudzes universitāte" -->
    <div id="university" class="my-5">
      <h1>Trešās paaudzes universitāte</h1>

      <div id="myCarousel" class="carousel slide mb-6" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active" aria-label="Slide 1"
            aria-current="true"></button>
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1" aria-label="Slide 2"
            class=""></button>
          <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2" aria-label="Slide 3"
            class=""></button>
        </div>
        <div class="carousel-inner">

          <div class="carousel-item active">
            <img class="bd-placeholder-img" width="100%" height="25%"
              src="https://images.pexels.com/photos/159711/books-bookstore-book-reading-159711.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2"
              alt="library">
          </div>

          <div class="carousel-item">
            <img class="bd-placeholder-img" width="100%" height="25%"
              src="https://images.pexels.com/photos/1370295/pexels-photo-1370295.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2"
              alt="library">
          </div>

          <div class="carousel-item">
            <img class="bd-placeholder-img" width="100%" height="25%"
              src="https://images.pexels.com/photos/207662/pexels-photo-207662.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2"
              alt="library">
          </div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

      <div id="topicality-university-container"></div>

    </div>

  </main>
